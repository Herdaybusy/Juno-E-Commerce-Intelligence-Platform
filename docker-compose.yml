version: "3.9"

services:


  # PostgreSQL Data Warehouse

  postgres:
    image: postgres:15-alpine
    container_name: juno_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5



  # Airflow Init (DB migration + admin user)
 
  airflow-init:
    image: apache/airflow:2.9.0
    container_name: juno_airflow_init

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}

    command: >
      bash -c "airflow db migrate &&
               airflow users create
               --username admin
               --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
               --firstname admin
               --lastname user
               --role Admin
               --email admin@example.com"

    volumes:
      - ./dags:/opt/airflow/dags
      - ./pipelines:/opt/airflow/pipelines
      - ./config:/opt/airflow/config
      - ./utils:/opt/airflow/utils
      - ./data:/opt/airflow/data

    env_file:
      - .env



  # Airflow Webserver

  airflow-webserver:
    image: apache/airflow:2.9.0
    container_name: juno_airflow_webserver
    restart: unless-stopped

    depends_on:
      - airflow-init

    ports:
      - "8080:8080"

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

    command: webserver

    volumes:
      - ./dags:/opt/airflow/dags
      - ./pipelines:/opt/airflow/pipelines
      - ./config:/opt/airflow/config
      - ./utils:/opt/airflow/utils
      - ./data:/opt/airflow/data

    env_file:
      - .env

    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5


  # Airflow Scheduler
 
  airflow-scheduler:
    image: apache/airflow:2.9.0
    container_name: juno_airflow_scheduler
    restart: unless-stopped

    depends_on:
      - airflow-webserver

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

    command: scheduler

    volumes:
      - ./dags:/opt/airflow/dags
      - ./pipelines:/opt/airflow/pipelines
      - ./config:/opt/airflow/config
      - ./utils:/opt/airflow/utils
      - ./data:/opt/airflow/data

    env_file:
      - .env


volumes:
  postgres_data: